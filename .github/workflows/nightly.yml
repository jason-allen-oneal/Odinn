name: Nightly

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-main
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.14.0"

jobs:
  deep-check:
    name: Deep validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight
      - run: pnpm check
      - run: pnpm test:integration
      - run: pnpm smoke:inference
      - run: pnpm benchmark:ci
      - run: node scripts/ci/audit.ts moderate
      - run: pnpm release:package
      - run: pnpm release:checksums
      - run: pnpm storage:drill
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nightly-release-candidate
          path: dist/release/
          if-no-files-found: error
          retention-days: 7
