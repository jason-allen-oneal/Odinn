name: Bootstrap Odinn source

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/**"

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.repository == 'jason-allen-oneal/Odinn'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract verified source tree
        run: |
          mkdir -p /tmp/odinn-source
          base64 --decode .bootstrap/odinn.tar.gz.b64 > /tmp/odinn.tar.gz
          tar -xzf /tmp/odinn.tar.gz -C /tmp/odinn-source
          rsync -a --delete --exclude .git /tmp/odinn-source/ ./

      - name: Commit migrated source and CI/CD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: migrate Othin foundation to Odinn with full CI/CD"
          git push origin HEAD:main
