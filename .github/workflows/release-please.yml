name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Dispatch required checks for the generated release pull request
        if: steps.release.outputs.prs_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          number="$(jq -er '.number' <<<"$RELEASE_PR")"
          details="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$number")"
          branch="$(jq -er '.head.ref' <<<"$details")"
          base_sha="$(jq -er '.base.sha' <<<"$details")"
          head_sha="$(jq -er '.head.sha' <<<"$details")"
          title="$(jq -er '.title' <<<"$details")"

          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          gh workflow run package-integrity.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          gh workflow run workflow-lint.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          gh workflow run security.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" -f base_sha="$base_sha" -f head_sha="$head_sha"
          gh workflow run pr-title.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" -f pr_title="$title"

  publish_release:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release_please.outputs.tag_name }}
    secrets: inherit
