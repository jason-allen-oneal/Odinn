name: Merge Queue

on:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.14.0"

jobs:
  validate:
    name: Merge queue validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight
      - run: pnpm check
      - run: pnpm test:integration
      - run: pnpm smoke:inference
      - run: pnpm benchmark:ci
      - run: pnpm release:package
      - run: pnpm release:checksums
      - run: node scripts/release/verify.mjs
      - run: pnpm release:install-smoke
