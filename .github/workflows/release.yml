name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.14.0"

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight
      - run: pnpm check
      - run: pnpm test:integration
      - run: pnpm smoke:inference
      - run: pnpm benchmark:ci
      - run: pnpm audit --audit-level high

  source-package:
    name: Build release assets
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm release:package
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/release/odinn.spdx.json
      - run: pnpm release:checksums
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/release/*
      - uses: actions/upload-artifact@v4
        with:
          name: odinn-release-assets
          path: dist/release/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: source-package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: odinn-release-assets
          path: release-assets
      - name: Resolve and verify tag
        id: tag
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          tag="${REQUESTED_TAG:-$REF_TAG}"
          git fetch --tags --force
          git rev-parse --verify "refs/tags/$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes --title "Odinn $TAG"
          fi
          gh release upload "$TAG" release-assets/* --clobber
