name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.14.0"

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight
        env:
          ODINN_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      - run: pnpm check
      - run: pnpm test:integration
      - run: pnpm smoke:inference
      - run: pnpm benchmark:ci
      - run: node scripts/ci/audit.ts high

  source-package:
    name: Build release assets
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm release:package
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/release/odinn.spdx.json
      - run: pnpm release:checksums
      - run: node scripts/release/verify.ts
      - run: pnpm release:install-smoke
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/release/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: odinn-release-assets
          path: dist/release/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: source-package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: odinn-release-assets
          path: release-assets
      - name: Resolve and verify tag
        id: tag
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          tag="${REQUESTED_TAG:-$REF_TAG}"
          git fetch --tags --force
          git rev-parse --verify "refs/tags/$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            prerelease=()
            case "$TAG" in
              *-*) prerelease=(--prerelease) ;;
            esac
            gh release create "$TAG" --verify-tag --generate-notes --title "Odinn Forge $TAG" "${prerelease[@]}"
          fi
          gh release upload "$TAG" release-assets/* --clobber
