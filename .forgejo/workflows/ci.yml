name: Local CI

on:
  push:
    paths:
      - ".forgejo/workflows/**"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "eslint.config.*"
  pull_request:
    paths:
      - ".forgejo/workflows/**"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "eslint.config.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.14.0"
  CI: "true"

jobs:
  quality:
    name: Quality, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release preflight
        run: pnpm release:preflight

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Onboarding smoke test
        run: pnpm smoke:onboarding

      - name: Build
        run: pnpm build

  integration:
    name: Integration and protocol smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # This runner executes jobs through a nested Docker container. Keep the
    # default 2s benchmark budget elsewhere, but allow measured cold-start
    # noise here without disabling the guardrail.
    env:
      ODINN_BENCHMARK_P95_MAX_MS: "4000"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm test:integration

      - name: Inference protocol smoke
        run: pnpm smoke:inference

      - name: CI benchmark guardrails
        run: pnpm benchmark:ci
